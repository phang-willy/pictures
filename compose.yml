services:
  frontend:
    build:
      context: .
      dockerfile: infrastructure/frameworks/frontend/next/Dockerfile
      target: dev
    working_dir: /workspace/infrastructure/frameworks/frontend/next
    env_file:
      - ./.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${BACKEND_PORT:-3001}}
      # RSC / fetch serveur : le backend est un autre conteneur (pas localhost dans Docker)
      INTERNAL_API_URL: http://backend:${BACKEND_PORT:-3001}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - .:/workspace
      - front_node_modules:/workspace/infrastructure/frameworks/frontend/next/node_modules
      - front_next:/workspace/infrastructure/frameworks/frontend/next/.next
    networks:
      - app_network
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: ./infrastructure/frameworks/backend
      dockerfile: Dockerfile
    working_dir: /workspace/infrastructure/frameworks/backend
    env_file:
      - ./.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      WATCHPACK_POLLING: "true"
      TSC_WATCHFILE: "UsePolling"
      TSC_WATCHDIRECTORY: "UsePolling"
      NODE_PATH: /workspace/infrastructure/frameworks/backend/node_modules
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./:/workspace
      - backend_node_modules:/workspace/infrastructure/frameworks/backend/node_modules
    depends_on:
      db:
        condition: service_healthy
      maildev:
        condition: service_started
    restart: unless-stopped
    networks:
      - app_network

  db:
    image: postgis/postgis:17-3.5
    env_file:
      - ./.env
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - app_network

  adminer:
    image: adminer:latest
    env_file:
      - ./.env
    ports:
      - "${ADMINER_PORT}:${ADMINER_PORT}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

  maildev:
    image: maildev/maildev:latest
    ports:
      - "${MAILDEV_SMTP_PORT:-1025}:1025"
      - "${MAILDEV_WEB_PORT:-1080}:1080"
    restart: unless-stopped
    networks:
      - app_network

volumes:
  postgres_data:
  backend_node_modules:
  front_node_modules:
  front_next:

networks:
  app_network:
    driver: bridge