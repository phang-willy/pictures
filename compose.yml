services:
  front:
    container_name: pictures-frontend
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      target: dev
    env_file:
      - ./.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      - ./apps/frontend:/app
      - ./shared:/shared
      - front_node_modules:/app/node_modules
      - front_next:/app/.next
    depends_on:
      back:
        condition: service_started
    restart: unless-stopped

  back:
    container_name: pictures-backend
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: dev
    env_file:
      - ./.env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      WATCHPACK_POLLING: "true"
      TSC_WATCHFILE: "UsePolling"
      TSC_WATCHDIRECTORY: "UsePolling"
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./apps/backend:/app
      - ./shared:/shared
      - back_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
      maildev:
        condition: service_started
    restart: unless-stopped
    networks:
      - backend

  db:
    container_name: database
    image: postgis/postgis:17-3.5
    env_file:
      - ./.env
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - backend

  adminer:
    container_name: adminer
    image: adminer:latest
    env_file:
      - ./.env
    ports:
      - "${ADMINER_PORT}:${ADMINER_PORT}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - backend

  maildev:
    container_name: maildev
    image: maildev/maildev:latest
    ports:
      - "${MAILDEV_SMTP_PORT:-1025}:1025"
      - "${MAILDEV_WEB_PORT:-1080}:1080"
    restart: unless-stopped
    networks:
      - backend

volumes:
  postgres_data:
  front_node_modules:
  front_next:
  back_node_modules:

networks:
  backend:
    driver: bridge