name: CI

on:
  push:
    branches:
      - dev
      - pre-prod
      - main
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - dev
      - pre-prod
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    name: Lint / Type-check / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: |
            infrastructure/frameworks/backend/package-lock.json
            infrastructure/frameworks/frontend/next/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: infrastructure/frameworks/backend

      - name: Prisma generate
        run: npx prisma generate
        working-directory: infrastructure/frameworks/backend
        env:
          # Requis par prisma.config.ts (aucune connexion réelle pour generate)
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public

      - name: Test backend
        run: npm test
        working-directory: infrastructure/frameworks/backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: infrastructure/frameworks/frontend/next

      - name: Lint frontend
        run: npm run lint
        working-directory: infrastructure/frameworks/frontend/next

      - name: Type-check frontend
        run: npm run type-check
        working-directory: infrastructure/frameworks/frontend/next

      - name: Build frontend
        run: npm run build
        working-directory: infrastructure/frameworks/frontend/next
